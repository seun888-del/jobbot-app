<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JobBot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar">
      <h1>JobBot</h1>
      <p class="tagline">Job Search Automation</p>
      <ul id="nav">
        <li data-view="personal" class="active"><span class="nav-num">1</span>Personal Details</li>
        <li data-view="login"><span class="nav-num">2</span>Job Site Login</li>
        <li data-view="cvs"><span class="nav-num">3</span>CVs</li>
        <li data-view="search"><span class="nav-num">4</span>Search Preferences</li>
        <li data-view="license"><span class="nav-num">5</span>License</li>
        <li data-view="dashboard" class="nav-dashboard"><span class="nav-icon"></span>Dashboard</li>
        <li data-view="help" class="nav-help"><span class="nav-icon">?</span>Help</li>
      </ul>
    </nav>
    <div class="main-wrapper">
      <div id="expiry-banner"></div>
      <main id="content"></main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
