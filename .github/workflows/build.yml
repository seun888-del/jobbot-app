name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright browsers
        run: npx playwright install chromium

      - name: Copy browsers to playwright-browsers
        run: |
          $src = "$env:USERPROFILE\AppData\Local\ms-playwright"
          $dst = "playwright-browsers"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item -Recurse -Force "$src\*" "$dst\"

      - name: Inject secrets
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          $f = "bot\config.js"
          [System.IO.File]::WriteAllText((Resolve-Path $f), ((Get-Content -Raw $f) -replace '__CAPSOLVER_KEY__', '${{ secrets.CAPSOLVER_KEY }}'), $utf8)
          $f = "bot\modules\browser_launcher.js"
          [System.IO.File]::WriteAllText((Resolve-Path $f), ((Get-Content -Raw $f) -replace '__PROXY_URL__', '${{ secrets.PROXY_URL }}'), $utf8)
          $f = "main.js"
          [System.IO.File]::WriteAllText((Resolve-Path $f), ((Get-Content -Raw $f) -replace '__PROXY_URL__', '${{ secrets.PROXY_URL }}'), $utf8)
          $f = "src\services\llm.js"
          [System.IO.File]::WriteAllText((Resolve-Path $f), ((Get-Content -Raw $f) -replace '__GROQ_KEY__', '${{ secrets.GROQ_KEY }}'), $utf8)
        shell: pwsh

      - name: Build Windows installer
        run: npm run dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobBot-Windows
          path: |
            dist/*.exe
            dist/latest.yml

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: JobBot-Windows
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
